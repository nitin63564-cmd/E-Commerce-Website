<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - ShopVerse</title>
  <meta name="description" content="Search for products at ShopVerse. Find exactly what you're looking for from our wide collection.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .search-hero {
      background: var(--gradient-hero);
      padding: 80px 0;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .search-hero h1 { font-size: clamp(28px, 4vw, 48px); font-weight: 800; margin-bottom: 12px; }
    .search-hero p { color: var(--text-muted); margin-bottom: 36px; }
    .search-box-large {
      max-width: 680px; margin: 0 auto;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 50px; display: flex; overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .search-box-large input {
      flex: 1; padding: 18px 28px; background: transparent; border: none;
      color: var(--text); font-size: 16px; font-family: inherit; outline: none;
    }
    .search-box-large input::placeholder { color: var(--text-light); }
    .search-box-large button {
      padding: 12px 32px; background: var(--gradient-primary); border: none; border-radius: 50px;
      color: white; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      margin: 6px; transition: var(--transition);
    }
    .search-box-large button:hover { opacity: 0.9; transform: scale(0.98); }
    .search-suggestions { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .suggestion-pill {
      padding: 6px 16px; background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
      border-radius: 50px; font-size: 13px; color: var(--primary-light); cursor: pointer; transition: var(--transition);
    }
    .suggestion-pill:hover { background: var(--primary); color: white; }

    .search-results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .search-query { font-size: 18px; font-weight: 700; }
    .search-query span { color: var(--primary-light); }
    .no-results { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .no-results i { font-size: 80px; color: var(--text-light); margin-bottom: 24px; display: block; }
    .popular-searches { margin-top: 40px; }
    .popular-searches h3 { margin-bottom: 16px; font-size: 15px; color: var(--text-muted); }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<main>
  <!-- Search Hero -->
  <div class="search-hero">
    <div class="container">
      <h1>Search <span style="color:var(--primary-light)">Products</span></h1>
      <p>Find exactly what you're looking for from our massive collection</p>
      <div class="search-box-large">
        <input type="text" id="mainSearchInput" placeholder="Search for products, brands, categories..." autocomplete="off">
        <button onclick="performMainSearch()"><i class="fas fa-search"></i> Search</button>
      </div>
      <div class="search-suggestions">
        <span class="suggestion-pill" onclick="quickSearch('Headphones')">Headphones</span>
        <span class="suggestion-pill" onclick="quickSearch('Laptop')">Laptop</span>
        <span class="suggestion-pill" onclick="quickSearch('Nike')">Nike</span>
        <span class="suggestion-pill" onclick="quickSearch('Watch')">Watch</span>
        <span class="suggestion-pill" onclick="quickSearch('Yoga')">Yoga</span>
        <span class="suggestion-pill" onclick="quickSearch('Book')">Books</span>
        <span class="suggestion-pill" onclick="quickSearch('Skincare')">Skincare</span>
      </div>
    </div>
  </div>

  <section class="section" style="padding-top:48px">
    <div class="container">
      <div id="searchResultsSection"></div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  renderLayout('');

  const urlParams = new URLSearchParams(window.location.search);
  const q = urlParams.get('q');
  if (q) {
    document.getElementById('mainSearchInput').value = q;
    doSearch(q);
  } else {
    showInitialState();
  }

  function quickSearch(term) {
    document.getElementById('mainSearchInput').value = term;
    doSearch(term);
  }

  function performMainSearch() {
    const q = document.getElementById('mainSearchInput').value.trim();
    if (q) {
      history.replaceState(null, '', `?q=${encodeURIComponent(q)}`);
      doSearch(q);
    }
  }

  document.getElementById('mainSearchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') performMainSearch();
  });

  function doSearch(query) {
    const q = query.toLowerCase().trim();
    const results = products.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q)
    );

    const el = document.getElementById('searchResultsSection');

    if (results.length === 0) {
      el.innerHTML = `
        <div class="no-results">
          <i class="fas fa-search"></i>
          <h2>No results for "${query}"</h2>
          <p>Try different keywords or browse our categories</p>
          <div class="popular-searches">
            <h3>Try searching for:</h3>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
              ${['Electronics','Fashion','Sports','Books','Beauty'].map(s =>
                `<span class="suggestion-pill" onclick="quickSearch('${s}')">${s}</span>`
              ).join('')}
            </div>
          </div>
          <a href="products.html" class="btn btn-primary" style="margin-top:32px">Browse All Products</a>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="search-results-header">
          <div class="search-query">
            Showing <span>${results.length} result${results.length !== 1 ? 's' : ''}</span> for "${query}"
          </div>
          <a href="products.html" class="btn btn-outline btn-sm">View All Products</a>
        </div>
        <div class="grid grid-4">${results.map(p => renderProductCard(p)).join('')}</div>`;
    }
  }

  function showInitialState() {
    const el = document.getElementById('searchResultsSection');
    el.innerHTML = `
      <div class="section-header">
        <span class="section-label">Trending Now</span>
        <h2 class="section-title">Popular <span>Products</span></h2>
        <p class="section-subtitle">Discover what everyone is shopping for right now</p>
      </div>
      <div class="grid grid-4">${products.slice(0,8).map(p => renderProductCard(p)).join('')}</div>`;
  }
</script>
</body>
</html>
