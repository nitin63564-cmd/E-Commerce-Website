<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ShopVerse</title>
  <meta name="description" content="Complete your purchase securely at ShopVerse. Enter shipping information and place your order.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 400px; gap: 32px; align-items: start; }
    .checkout-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 32px; margin-bottom: 24px;
    }
    .checkout-card h3 {
      font-size: 16px; font-weight: 700; margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .checkout-card h3 .step-num {
      width: 28px; height: 28px; background: var(--gradient-primary); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white;
      flex-shrink: 0;
    }

    .payment-methods { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .payment-method-btn {
      flex: 1; min-width: 100px; padding: 12px 16px; background: var(--dark-3); border: 2px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-muted); cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; font-weight: 600; font-family: inherit;
    }
    .payment-method-btn:hover { border-color: var(--primary); color: var(--text); }
    .payment-method-btn.active { border-color: var(--primary); color: var(--primary-light); background: rgba(108,99,255,0.1); }

    /* Order Summary Sidebar */
    .checkout-summary {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 28px; position: sticky; top: calc(var(--nav-height) + 20px);
    }
    .checkout-summary h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .summary-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .summary-item:last-of-type { border-bottom: none; }
    .summary-item-img { width: 52px; height: 52px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
    .summary-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .summary-item-info { flex: 1; }
    .summary-item-info h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .summary-item-info span { font-size: 12px; color: var(--text-muted); }
    .summary-item-price { font-size: 14px; font-weight: 700; color: var(--primary-light); }

    .steps-indicator {
      display: flex; align-items: center; gap: 0; margin-bottom: 32px; padding: 20px 0;
    }
    .step-item { display: flex; align-items: center; gap: 8px; flex: 1; }
    .step-item:last-child { flex: 0; }
    .step-circle {
      width: 36px; height: 36px; border-radius: 50%; background: var(--dark-3);
      border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--text-muted); transition: var(--transition);
      flex-shrink: 0;
    }
    .step-circle.active { background: var(--primary); border-color: var(--primary); color: white; }
    .step-circle.done { background: var(--accent); border-color: var(--accent); color: white; }
    .step-label { font-size: 12px; color: var(--text-muted); }
    .step-connector { flex: 1; height: 2px; background: var(--border); margin: 0 8px; }
    .step-connector.done { background: var(--accent); }

    @media (max-width: 1024px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .checkout-summary { position: static; }
    }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<main>
  <section class="page-hero">
    <div class="container">
      <div class="page-hero-content">
        <div class="breadcrumb">
          <a href="index.html">Home</a>
          <span><i class="fas fa-chevron-right" style="font-size:10px"></i></span>
          <a href="cart.html">Cart</a>
          <span><i class="fas fa-chevron-right" style="font-size:10px"></i></span>
          <span>Checkout</span>
        </div>
        <h1>Secure <span style="color:var(--primary-light)">Checkout</span></h1>
        <p>Complete your order safely and securely</p>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:40px">
    <div class="container">
      <!-- Steps -->
      <div class="steps-indicator">
        <div class="step-item">
          <div class="step-circle done"><i class="fas fa-check"></i></div>
          <div class="step-label">Cart</div>
        </div>
        <div class="step-connector done"></div>
        <div class="step-item">
          <div class="step-circle active">2</div>
          <div class="step-label">Checkout</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-item">
          <div class="step-circle">3</div>
          <div class="step-label">Confirmation</div>
        </div>
      </div>

      <div class="checkout-layout">
        <!-- FORMS -->
        <div>
          <!-- Shipping Info -->
          <div class="checkout-card">
            <h3><span class="step-num">1</span> Shipping Information</h3>
            <form id="shippingForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">First Name *</label>
                  <input type="text" class="form-control" id="firstName" placeholder="John" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Last Name *</label>
                  <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Email Address *</label>
                <input type="email" class="form-control" id="email" placeholder="john.doe@email.com" required>
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number *</label>
                <input type="tel" class="form-control" id="phone" placeholder="+1 (555) 000-0000" required>
              </div>
              <div class="form-group">
                <label class="form-label">Street Address *</label>
                <input type="text" class="form-control" id="address" placeholder="123 Main Street, Apt 4B" required>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">City *</label>
                  <input type="text" class="form-control" id="city" placeholder="New York" required>
                </div>
                <div class="form-group">
                  <label class="form-label">State / Province *</label>
                  <input type="text" class="form-control" id="state" placeholder="NY" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">ZIP / Postal Code *</label>
                  <input type="text" class="form-control" id="zip" placeholder="10001" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Country *</label>
                  <select class="form-control" id="country" required>
                    <option value="">Select country</option>
                    <option value="US" selected>United States</option>
                    <option value="UK">United Kingdom</option>
                    <option value="CA">Canada</option>
                    <option value="AU">Australia</option>
                    <option value="IN">India</option>
                    <option value="DE">Germany</option>
                    <option value="FR">France</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Delivery Notes (Optional)</label>
                <input type="text" class="form-control" id="notes" placeholder="Leave at door, ring doorbell, etc.">
              </div>
            </form>
          </div>

          <!-- Shipping Method -->
          <div class="checkout-card">
            <h3><span class="step-num">2</span> Shipping Method</h3>
            <div style="display:flex;flex-direction:column;gap:12px">
              <label style="cursor:pointer">
                <div class="payment-method-btn active" style="justify-content:space-between;width:100%">
                  <div style="display:flex;align-items:center;gap:10px">
                    <i class="fas fa-shipping-fast"></i>
                    <div>
                      <div style="font-weight:700">Standard Shipping</div>
                      <div style="font-size:11px;color:var(--text-muted)">3-5 business days</div>
                    </div>
                  </div>
                  <span style="color:var(--accent)">FREE</span>
                </div>
              </label>
              <label style="cursor:pointer">
                <div class="payment-method-btn" style="justify-content:space-between;width:100%">
                  <div style="display:flex;align-items:center;gap:10px">
                    <i class="fas fa-bolt"></i>
                    <div>
                      <div style="font-weight:700">Express Shipping</div>
                      <div style="font-size:11px;color:var(--text-muted)">1-2 business days</div>
                    </div>
                  </div>
                  <span>$14.99</span>
                </div>
              </label>
            </div>
          </div>

          <!-- Payment Method -->
          <div class="checkout-card">
            <h3><span class="step-num">3</span> Payment Method</h3>
            <div class="payment-methods">
              <button class="payment-method-btn active" onclick="selectPayment(this,'card')">
                <i class="fas fa-credit-card"></i> Credit Card
              </button>
              <button class="payment-method-btn" onclick="selectPayment(this,'paypal')">
                <i class="fab fa-paypal"></i> PayPal
              </button>
              <button class="payment-method-btn" onclick="selectPayment(this,'upi')">
                <i class="fas fa-mobile-alt"></i> UPI
              </button>
              <button class="payment-method-btn" onclick="selectPayment(this,'cod')">
                <i class="fas fa-money-bill-wave"></i> Cash on Delivery
              </button>
            </div>
            <div id="cardFields">
              <div class="form-group">
                <label class="form-label">Card Number</label>
                <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19"
                  oninput="formatCard(this)">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Expiry Date</label>
                  <input type="text" class="form-control" id="expiry" placeholder="MM/YY" maxlength="5">
                </div>
                <div class="form-group">
                  <label class="form-label">CVV</label>
                  <input type="text" class="form-control" id="cvv" placeholder="123" maxlength="3">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Name on Card</label>
                <input type="text" class="form-control" id="cardName" placeholder="John Doe">
              </div>
            </div>
          </div>
        </div>

        <!-- ORDER SUMMARY -->
        <div class="checkout-summary">
          <h3><i class="fas fa-receipt" style="color:var(--primary);margin-right:8px"></i>Order Summary</h3>
          <div id="summaryItems"></div>
          <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
          <div class="summary-row">
            <span class="label" style="color:var(--text-muted)">Subtotal</span>
            <span class="value" id="summarySubtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span class="label" style="color:var(--text-muted)">Shipping</span>
            <span class="value" style="color:var(--accent)">FREE</span>
          </div>
          <div class="summary-row">
            <span class="label" style="color:var(--text-muted)">Tax (8%)</span>
            <span class="value" id="summaryTax">$0.00</span>
          </div>
          <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
          <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-bottom:24px">
            <span>Total</span>
            <span style="color:var(--primary-light)" id="summaryTotal">$0.00</span>
          </div>
          <button onclick="placeOrder()" class="btn btn-primary btn-full btn-lg" style="margin-bottom:16px">
            <i class="fas fa-lock"></i> Place Order
          </button>
          <a href="cart.html" class="btn btn-outline btn-full">
            <i class="fas fa-arrow-left"></i> Back to Cart
          </a>
          <div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-top:20px;font-size:12px;color:var(--text-muted)">
            <i class="fas fa-shield-alt" style="color:var(--accent)"></i>
            Your payment info is encrypted and secure
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  renderLayout('');

  // Populate summary
  function populateSummary() {
    const itemsEl = document.getElementById('summaryItems');
    const subtotal = getCartTotal();
    const tax = subtotal * 0.08;
    const total = subtotal + tax;

    if (cart.length === 0) {
      itemsEl.innerHTML = `<p style="text-align:center;color:var(--text-muted);padding:20px">Your cart is empty. <a href="products.html" style="color:var(--primary-light)">Shop now</a></p>`;
    } else {
      itemsEl.innerHTML = cart.map(item => `
        <div class="summary-item">
          <div class="summary-item-img">
            <img src="${item.image}" alt="${item.name}"
              onerror="this.src='https://placehold.co/52x52/1A1A35/6C63FF?text=P'">
          </div>
          <div class="summary-item-info">
            <h4>${item.name}</h4>
            <span>Qty: ${item.quantity}</span>
          </div>
          <span class="summary-item-price">$${(item.price * item.quantity).toFixed(2)}</span>
        </div>`).join('');
    }

    document.getElementById('summarySubtotal').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('summaryTax').textContent = `$${tax.toFixed(2)}`;
    document.getElementById('summaryTotal').textContent = `$${total.toFixed(2)}`;
  }

  function selectPayment(btn, type) {
    document.querySelectorAll('.payment-method-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('cardFields').style.display = type === 'card' ? 'block' : 'none';
  }

  function formatCard(input) {
    let val = input.value.replace(/\D/g, '').substring(0, 16);
    input.value = val.replace(/(.{4})/g, '$1 ').trim();
  }

  function placeOrder() {
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const email = document.getElementById('email').value;
    const address = document.getElementById('address').value;
    const city = document.getElementById('city').value;

    if (!firstName || !lastName || !email || !address || !city) {
      alert('Please fill in all required shipping fields.');
      return;
    }
    if (cart.length === 0) {
      alert('Your cart is empty!');
      return;
    }

    // Generate order number and save
    const orderNum = 'SV' + Date.now().toString().slice(-8);
    const orderData = {
      orderNumber: orderNum,
      items: [...cart],
      total: (getCartTotal() + getCartTotal() * 0.08).toFixed(2),
      shipping: { firstName, lastName, email, address, city },
      date: new Date().toLocaleDateString()
    };
    localStorage.setItem('lastOrder', JSON.stringify(orderData));

    // Clear cart
    cart = [];
    saveCart();

    // Redirect
    window.location.href = 'order-confirmation.html';
  }

  populateSummary();
</script>
</body>
</html>
